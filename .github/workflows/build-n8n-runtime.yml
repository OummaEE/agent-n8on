name: Build n8n Runtime

on:
  workflow_dispatch:
    inputs:
      n8n_version:
        description: 'n8n version to build'
        required: true
        default: '2.11.4'
      node_version:
        description: 'Node.js version'
        required: true
        default: '22.16.0'
  push:
    tags: ['v*']

env:
  N8N_VERSION: ${{ github.event.inputs.n8n_version || '2.11.4' }}
  NODE_VERSION: ${{ github.event.inputs.node_version || '22.16.0' }}

jobs:
  build-runtime:
    runs-on: windows-2022
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js (for building)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Fix Python distutils for node-gyp
        shell: pwsh
        run: |
          pip install setuptools

      - name: Diagnostics - toolchain environment
        shell: pwsh
        run: |
          Write-Host "=== Node / npm ==="
          node -v
          npm -v
          Write-Host "`n=== Python ==="
          python --version 2>$null
          pip show setuptools 2>$null | Select-Object -First 3
          Write-Host "`n=== C++ compiler (cl.exe) ==="
          where.exe cl 2>$null || Write-Host "cl.exe not found"
          Write-Host "`n=== Key env vars ==="
          Write-Host "WindowsSdkDir: $env:WindowsSdkDir"
          Write-Host "VSINSTALLDIR: $env:VSINSTALLDIR"

      - name: Add Defender exclusions (best-effort)
        shell: pwsh
        run: |
          Write-Host "Defender exclusions are best-effort only"
          Add-MpPreference -ExclusionPath "${{ github.workspace }}" -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionPath "$env:TEMP" -ErrorAction SilentlyContinue

      # ============================================================
      # DOWNLOAD PORTABLE NODE.JS
      # ============================================================
      - name: Download portable Node.js
        shell: pwsh
        run: |
          $nodeUrl = "https://nodejs.org/dist/v${{ env.NODE_VERSION }}/node-v${{ env.NODE_VERSION }}-win-x64.zip"
          Write-Host "Downloading portable Node.js from $nodeUrl"
          
          Invoke-WebRequest -Uri $nodeUrl -OutFile node-portable.zip -UseBasicParsing
          
          Write-Host "Extracting portable Node.js..."
          Expand-Archive -Path node-portable.zip -DestinationPath node-temp -Force
          
          # Restructure: node-v22.16.0-win-x64/ -> node/
          New-Item -ItemType Directory -Force -Path runtime\node | Out-Null
          Copy-Item -Path "node-temp\node-v${{ env.NODE_VERSION }}-win-x64\*" -Destination runtime\node -Recurse
          
          # Verify
          $nodeExe = "runtime\node\node.exe"
          if (Test-Path $nodeExe) {
            & $nodeExe --version
            Write-Host "Portable Node.js ready"
          } else {
            Write-Host "::error::node.exe not found after extraction"
            exit 1
          }

      # ============================================================
      # INSTALL N8N
      # ============================================================
      - name: Install n8n runtime
        shell: pwsh
        env:
          npm_config_msvs_version: '2022'
        run: |
          Write-Host "Installing n8n@${{ env.N8N_VERSION }}..."
          Write-Host "This will take 5-15 minutes"
          
          npm install "n8n@${{ env.N8N_VERSION }}" --prefix ./runtime/n8n --omit=dev --foreground-scripts 2>&1 | Tee-Object -FilePath npm-install.log
          $exitCode = $LASTEXITCODE
          
          if ($exitCode -ne 0) {
            Write-Host "::warning::First npm install attempt failed with exit code $exitCode"
            Get-Content npm-install.log | Select-Object -Last 50
            
            $log = Get-Content npm-install.log -Raw
            
            if ($log -match "EPERM|EBUSY") {
              Write-Host "::warning::EPERM/EBUSY detected — retrying"
              npm cache clean --force
              Start-Sleep -Seconds 5
              npm install "n8n@${{ env.N8N_VERSION }}" --prefix ./runtime/n8n --omit=dev --force --foreground-scripts 2>&1 | Tee-Object -FilePath npm-install-retry.log
              
              if ($LASTEXITCODE -ne 0) {
                Write-Host "::error::Retry failed with exit code $LASTEXITCODE"
                Get-Content npm-install-retry.log | Select-Object -Last 50
                exit 1
              }
            }
            else {
              Write-Host "::error::npm install failed. Check logs."
              exit 1
            }
          }

      # ============================================================
      # CREATE MANIFEST
      # ============================================================
      - name: Create manifest.json
        shell: pwsh
        run: |
          $npmVersion = (npm --version).Trim()
          $builtAt = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          
          $manifest = @{
            n8n_version = "${{ env.N8N_VERSION }}"
            node_version = "${{ env.NODE_VERSION }}"
            npm_version = $npmVersion
            runtime_tag = "runtime-v1.0.0"
            built_at = $builtAt
            paths = @{
              node_exe = "node/node.exe"
              n8n_bin = "n8n/node_modules/n8n/bin/n8n"
            }
          }
          
          $manifest | ConvertTo-Json -Depth 3 | Out-File -FilePath runtime/manifest.json -Encoding utf8NoBOM
          
          Write-Host "manifest.json created:"
          Get-Content runtime/manifest.json

      # ============================================================
      # VERIFY
      # ============================================================
      - name: Verify n8n starts
        shell: pwsh
        run: |
          Write-Host "Testing n8n startup with portable Node..."
          
          $nodeExe = "./runtime/node/node.exe"
          $n8nBin = "./runtime/n8n/node_modules/n8n/bin/n8n"
          
          if (!(Test-Path $nodeExe)) {
            Write-Host "::error::node.exe not found at $nodeExe"
            exit 1
          }
          if (!(Test-Path $n8nBin)) {
            Write-Host "::error::n8n binary not found at $n8nBin"
            exit 1
          }
          
          & $nodeExe --no-node-snapshot $n8nBin --help 2>&1 | Select-Object -First 5
          Write-Host "n8n binary responds — OK"

      # ============================================================
      # PACKAGE
      # ============================================================
      - name: Package runtime
        shell: pwsh
        run: |
          Write-Host "Packaging runtime..."
          Compress-Archive -Path ./runtime/* -DestinationPath n8n-runtime-win64.zip -Force
          
          $hash = (Get-FileHash n8n-runtime-win64.zip -Algorithm SHA256).Hash
          $hash | Out-File -FilePath sha256.txt -NoNewline
          
          $size = (Get-Item n8n-runtime-win64.zip).Length / 1MB
          Write-Host "Runtime package: n8n-runtime-win64.zip"
          Write-Host "Size: $([math]::Round($size, 1)) MB"
          Write-Host "SHA256: $hash"

      # ============================================================
      # UPLOAD
      # ============================================================
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: n8n-runtime-win64
          path: |
            n8n-runtime-win64.zip
            sha256.txt
          retention-days: 30

      - name: Upload npm logs (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-logs
          path: |
            npm-install.log
            npm-install-retry.log
          if-no-files-found: warn
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            n8n-runtime-win64.zip
            sha256.txt
          body: |
            ## n8n Runtime for Windows x64
            
            - n8n version: ${{ env.N8N_VERSION }}
            - Node.js version: ${{ env.NODE_VERSION }}
            - Built on: windows-2022 (GitHub Actions)
            
            ### SHA256
            See attached `sha256.txt`
